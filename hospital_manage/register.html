<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | MediCore HMS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bg:#020617;--bg-soft:#0f172a;--card:rgba(15,23,42,.62);--card-strong:rgba(15,23,42,.86);--border:rgba(255,255,255,.16);--primary:#6366F1;--primary-light:#818CF8;--accent:#22D3EE;--text:#E5E7EB;--muted:#9CA3AF;}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(900px circle at 12% 16%, rgba(99,102,241,.24), transparent 42%),radial-gradient(700px circle at 88% 84%, rgba(34,211,238,.2), transparent 48%),linear-gradient(145deg,var(--bg-soft),var(--bg));color:var(--text)}
.back-home{position:absolute;top:24px;left:24px;color:#c7d2fe;text-decoration:none;background:rgba(15,23,42,.7);border:1px solid var(--border);padding:8px 12px;border-radius:999px}
.role-switch{position:absolute;top:24px;right:24px;display:flex;gap:8px;padding:6px;background:rgba(15,23,42,.7);border:1px solid var(--border);border-radius:999px}
.role-switch button{padding:9px 14px;border:none;border-radius:999px;background:transparent;color:#fff;cursor:pointer}
.role-switch button.active{background:linear-gradient(135deg,#6366F1,#818CF8)}
.auth-card{width:100%;max-width:440px;background:linear-gradient(150deg,var(--card),var(--card-strong));border:1px solid var(--border);backdrop-filter:blur(22px);border-radius:24px;padding:34px 30px 28px;box-shadow:0 24px 80px rgba(0,0,0,.58)}
.brand-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;border:1px solid rgba(129,140,248,.5);background:rgba(99,102,241,.14);color:#c7d2fe;font-size:12px;margin-bottom:12px}
h2{font-size:30px;margin-bottom:4px}
.subtitle{font-size:13px;color:var(--muted);margin:0 0 18px}
.input-group{margin-bottom:14px}.input-wrapper{position:relative}
.input-wrapper input{width:100%;padding:13px 14px 13px 42px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;color:var(--text)}
.input-wrapper i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.input-wrapper input:focus{outline:none;border-color:rgba(129,140,248,.88);box-shadow:0 0 0 3px rgba(99,102,241,.2)}
.btn{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#6366F1,#818CF8);color:white;cursor:pointer;font-weight:600}
.toggle{margin-top:16px;color:var(--muted);cursor:pointer;text-align:center;font-size:13px}
.toggle strong{color:#c7d2fe}
#toast-container{position:fixed;top:20px;right:20px}
.toast{background:#111827;color:#fff;padding:12px 16px;border-radius:8px;margin-bottom:10px;opacity:0;transform:translateX(50px);transition:.3s}
.toast.show{opacity:1;transform:translateX(0)} .toast.success{border-left:4px solid #22c55e}.toast.error{border-left:4px solid #ef4444}

/* Consistency sweep */
:root { --ui-radius: 14px; --ui-shadow: 0 10px 28px rgba(15,23,42,0.12); }
.card, .table-card, .form-card, .auth-card, .appointment-card, .stat-card, .doctor-pill, .btn, .btn-primary, .btn-sm, .refresh-btn, .menu-item, .sidebar-menu li a, .role-switch button, .user-profile, input, select, textarea { border-radius: var(--ui-radius) !important; }
.card, .table-card, .form-card, .auth-card, .appointment-card, .stat-card, .user-profile { box-shadow: var(--ui-shadow) !important; }
</style>
</head>
<body>
<div id="toast-container"></div>
<a class="back-home" href="index.html"><i class="fas fa-arrow-left"></i> Home</a>
<div class="role-switch">
    <button id="adminBtn" onclick="setRole('admin',this)">Admin</button>
    <button id="doctorBtn" onclick="setRole('doctor',this)">Doctor</button>
    <button id="patientBtn" class="active" onclick="setRole('patient',this)">Patient</button>
</div>
<div class="auth-card">
<span class="brand-badge"><i class="fa-solid fa-shield-heart"></i> MediCore Secure Access</span>
<h2 id="title">Register</h2>
<p class="subtitle" id="subtitle">Create your account to begin appointments and records.</p>
<form id="form">
<div class="input-group" id="nameField">
    <div class="input-wrapper">
        <input type="text" id="name" placeholder="Full Name" required>
        <i class="fas fa-user"></i>
    </div>
</div>
<div class="input-group"><div class="input-wrapper"><input type="email" id="email" placeholder="Email" required><i class="fas fa-envelope"></i></div></div>
<div class="input-group"><div class="input-wrapper"><input type="password" id="password" placeholder="Password" required><i class="fas fa-lock"></i></div></div>
<button class="btn" id="submitBtn">Register</button>
</form>
<div class="toggle" onclick="toggleForm()">Already have an account? <strong>Switch to Login</strong></div>
</div>
<script>
let isLogin = false;
let selectedRole = "patient";
function setRole(role,btn){selectedRole=role;document.querySelectorAll(".role-switch button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");showToast("Selected: "+role,"success");}
function toggleForm(){
    isLogin=!isLogin;
    document.getElementById("title").innerText=isLogin?"Login":"Register";
    document.getElementById("submitBtn").innerText=isLogin?"Login":"Register";
    document.getElementById("nameField").style.display=isLogin?"none":"block";
    document.getElementById("subtitle").innerText=isLogin?"Welcome back. Access your hospital portal in seconds.":"Create your account to begin appointments and records.";
    document.querySelector(".toggle").innerHTML=isLogin?"New here? <strong>Switch to Register</strong>":"Already have an account? <strong>Switch to Login</strong>";
}
document.getElementById("form").addEventListener("submit", async (e)=>{
    e.preventDefault();
    const email=document.getElementById("email").value;
    const password=document.getElementById("password").value;
    const name=document.getElementById("name").value;
    const url=isLogin?"http://localhost:5002/api/auth/login":"http://localhost:5002/api/auth/register";
    const body=isLogin?{email,password}:{name,email,password,role:selectedRole};
    try{
        const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        const data=await res.json();
        if(data.success){
            showToast("Success!","success");
            if(isLogin){
                localStorage.setItem("token",data.token);
                localStorage.setItem("user",JSON.stringify(data.user));
                setTimeout(()=>{const role=data.user.role;if(role==="admin")window.location.href="admin-dashboard.html";else if(role==="doctor")window.location.href="doctor-dashboard.html";else window.location.href="patient-dashboard.html";},800);
            } else {
                toggleForm();
            }
        } else { showToast(data.message || "Error","error"); }
    } catch { showToast("Server error","error"); }
});
function showToast(msg,type){const t=document.createElement("div");t.className="toast "+type;t.innerText=msg;const c=document.getElementById("toast-container");c.appendChild(t);setTimeout(()=>t.classList.add("show"),40);setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),300);},2600);}
</script>
</body>
</html>
