<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediCore HMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* --- MIDNIGHT GOLD THEME --- */
            --primary: #D4AF37;       /* Metallic Gold */
            --primary-dark: #B59021;  /* Deep Gold */
            --secondary: #0F172A;     /* Midnight Blue (Dark Accent) */
            
            --text-dark: #1e293b;
            --text-light: #64748b;
            
            /* Glass Effect colors */
            --glass-bg: rgba(255, 255, 255, 0.90);
            --glass-border: 1px solid rgba(212, 175, 55, 0.3); /* Gold border hint */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Midnight Gradient Background */
            background: linear-gradient(135deg, #0F172A 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }

        /* Blobs adapted for Dark Background */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #D4AF37; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #B59021; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(20px) scale(1.1); }
        }

        /* --- Glass Card --- */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); /* Darker shadow for depth */
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: center;
            margin: 20px;
        }

        .auth-header { margin-bottom: 35px; }
        .logo-icon {
            font-size: 2.5rem;
            color: var(--primary);
            background: rgba(15, 23, 42, 0.05); /* Subtle midnight tint */
            width: 70px; height: 70px;
            line-height: 70px;
            border-radius: 50%;
            margin: 0 auto 20px;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); /* Gold glow */
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        
        .auth-header h2 { color: var(--text-dark); font-weight: 700; margin-bottom: 8px; font-size: 1.8rem; }
        .auth-header p { color: var(--text-light); font-size: 0.95rem; }

        /* --- Form --- */
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-wrapper { position: relative; }

        .input-wrapper input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: #f8fafc;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s;
        }

        .input-wrapper input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15); /* Gold focus ring */
        }

        .input-wrapper input:focus + i { color: var(--primary); }

        /* --- Gold Button --- */
        .btn-primary {
            width: 100%;
            padding: 16px;
            /* Gradient from Gold to Deep Gold */
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); /* Gold shadow */
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        .auth-footer { margin-top: 30px; font-size: 0.9rem; color: var(--text-light); }
        .auth-footer a { color: var(--primary-dark); text-decoration: none; font-weight: 700; transition: color 0.2s; }
        .auth-footer a:hover { color: var(--primary); text-decoration: underline; }
        
        .back-home { display: block; margin-top: 15px; font-size: 0.85rem; color: #94a3b8 !important; }
        .back-home:hover { color: var(--text-dark) !important; text-decoration: none !important; }

        /* --- Toast Notification (Updated Colors) --- */
        #toast-container { position: fixed; top: 30px; right: 30px; z-index: 1000; }
        .toast {
            min-width: 300px;
            background: white;
            color: var(--text-dark);
            border-left: 5px solid var(--primary); /* Gold Left Border */
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-weight: 500;
            display: flex; align-items: center; gap: 12px;
            opacity: 0; transform: translateX(50px);
            transition: all 0.5s;
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.error { border-color: #ef4444; }
        .toast.error i { color: #ef4444; }
        .toast i { color: var(--primary); font-size: 1.2rem; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-loading i { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div id="toast-container"></div>

    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
            <h2>Welcome Back</h2>
            <p>Sign in to manage your health journey</p>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="Email Address" required>
                    <i class="fas fa-envelope"></i>
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">
                Sign In
            </button>
        </form>

        <div class="auth-footer">
            <p>New Patient? <a href="register.html">Create Account</a></p>
            <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            // Set Loading State
            btn.innerHTML = '<span class="btn-loading"><i class="fas fa-spinner"></i> Signing In...</span>';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // Remove this timeout in production (just for effect)
                // await new Promise(r => setTimeout(r, 600));

                const res = await fetch('http://localhost:5002/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    showToast('Login Successful!', 'success');
                    
                    // Store Token and User Info
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Redirect based on role
                    setTimeout(() => {
                        const role = data.user.role;
                        if (role === 'admin') window.location.href = 'admin-dashboard.html';
                        else if (role === 'doctor') window.location.href = 'doctor-dashboard.html';
                        else window.location.href = 'patient-dashboard.html';
                    }, 1000);
                } else {
                    showToast(data.message || 'Invalid credentials', 'error');
                    resetBtn(btn, originalText);
                }
            } catch (err) {
                console.error("Login error:", err);
                showToast('Server connection failed', 'error');
                resetBtn(btn, originalText);
            }
        });

        function resetBtn(btn, originalText) {
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            btn.disabled = false;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            
            toast.className = `toast ${type}`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => { toast.classList.add('show'); });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => { container.removeChild(toast); }, 600);
            }, 3000);
        }
    </script>
</body>
</html>
