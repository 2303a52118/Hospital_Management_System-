<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Doctor | MediCore Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4f46e5; /* Indigo */
            --primary-dark: #4338ca;
            --secondary: #10b981; /* Emerald */
            --dark: #1e293b;
            --light: #f8fafc;
            --text-gray: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);
            --shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #e2e8f0 100%);
            height: 100vh;
            overflow: hidden;
            color: var(--dark);
        }

        .dashboard-container { display: flex; height: 100%; }

        /* --- Modern Sidebar --- */
        .sidebar {
            width: 280px;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 4px 0 24px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar-header {
            padding: 10px 15px 40px;
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            letter-spacing: 0.5px;
        }
        
        .sidebar-header i { color: var(--secondary); }

        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }

        .sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .sidebar-menu li a:hover {
            background: rgba(255,255,255,0.05);
            color: white;
            transform: translateX(5px);
        }

        .sidebar-menu li.active a {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn { color: #f87171 !important; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.1) !important; }

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        /* Decorative blobs for background depth */
        .main-content::before {
            content: ''; position: absolute; top: -100px; right: -100px;
            width: 500px; height: 500px; background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, transparent 70%);
            border-radius: 50%; z-index: -1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }

        h2 { font-weight: 700; font-size: 1.8rem; color: var(--dark); }

        .back-link {
            color: var(--text-gray);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--primary); }

        /* --- Glassmorphism Form Card --- */
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            max-width: 800px;
            margin: 0 auto;
            padding: 50px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid white;
            animation: fadeInUp 0.7s ease-out;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .input-group { position: relative; display: flex; flex-direction: column; }
        .input-group.full { grid-column: span 2; }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-gray);
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 16px 20px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--dark);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .input-group i {
            position: absolute;
            right: 20px;
            top: 42px;
            color: #cbd5e1;
        }

        /* --- Button Styling --- */
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.4);
        }
        
        .btn-primary:active { transform: translateY(0); }

        /* --- Toast Notification --- */
        #toast-container { position: fixed; top: 30px; right: 30px; z-index: 1000; }
        .toast {
            min-width: 300px;
            background: white;
            color: var(--dark);
            border-left: 6px solid var(--primary);
            border-radius: 8px;
            padding: 18px 24px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transform: translateX(50px);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { border-color: var(--secondary); }
        .toast.success i { color: var(--secondary); }
        .toast.error { border-color: #ef4444; }
        .toast.error i { color: #ef4444; }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; padding: 15px; }
            .sidebar-menu { flex-direction: row; overflow-x: auto; padding-bottom: 10px; }
            .input-grid { grid-template-columns: 1fr; }
            .main-content { padding: 20px; }
        }

        /* Consistency sweep */
        :root { --ui-radius: 14px; --ui-shadow: 0 10px 28px rgba(15,23,42,0.12); }
        .card, .table-card, .form-card, .auth-card, .appointment-card, .stat-card, .doctor-pill, .btn, .btn-primary, .btn-sm, .refresh-btn, .menu-item, .sidebar-menu li a, .role-switch button, .user-profile, input, select, textarea { border-radius: var(--ui-radius) !important; }
        .card, .table-card, .form-card, .auth-card, .appointment-card, .stat-card, .user-profile { box-shadow: var(--ui-shadow) !important; }
    </style>
</head>
<body>
    <div id="toast-container"></div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-heartbeat"></i> MediCore
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
                <li class="active"><a href="#"><i class="fas fa-user-plus"></i> Add Doctor</a></li>
                <li><a href="patients.html"><i class="fas fa-user-injured"></i> Patients</a></li>
                <li><a href="appointments.html"><i class="fas fa-calendar-alt"></i> Appointments</a></li>
                
                <li class="sidebar-footer">
                    <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                </li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <div>
                    <h2>Onboard New Doctor</h2>
                    <p style="color: var(--text-gray); font-size: 0.9rem;">Create a new profile for medical staff</p>
                </div>
                <a href="admin-dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            </header>

            <div class="form-card">
                <form id="addDoctorForm">
                    <div class="input-grid">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="doc-name" required placeholder="e.g. Dr. Sarah Jenkins">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="input-group">
                            <label>Specialization</label>
                            <input type="text" id="doc-spec" required placeholder="e.g. Neurologist">
                            <i class="fas fa-stethoscope"></i>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="doc-email" required placeholder="doctor@medicore.com">
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="doc-password" required placeholder="••••••••">
                            <i class="fas fa-lock"></i>
                        </div>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text" id="doc-phone" required placeholder="+1 (555) 000-0000">
                            <i class="fas fa-phone"></i>
                        </div>
                        <div class="input-group">
                            <label>Experience (Years)</label>
                            <input type="number" id="doc-exp" value="0" min="0">
                            <i class="fas fa-briefcase"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-plus-circle" style="margin-right: 8px;"></i> Create Doctor Account
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script>
        // 1. Auth Check
        const token = localStorage.getItem('token');
        if (!token) {
            // Commented out for UI demo purposes. Uncomment for production.
            // window.location.href = 'login.html';
        }

        // 2. Form Submission Logic
        document.getElementById('addDoctorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            
            // Loading State
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            btn.style.opacity = '0.7';

            // Gather Data
            const doctorData = {
                name: document.getElementById('doc-name').value,
                specialization: document.getElementById('doc-spec').value,
                email: document.getElementById('doc-email').value,
                password: document.getElementById('doc-password').value,
                phone: document.getElementById('doc-phone').value,
                experience: document.getElementById('doc-exp').value
            };

            try {
                const res = await fetch('http://localhost:5002/api/doctors', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(doctorData)
                });

                const data = await res.json();

                if (data.success) {
                    showToast('Doctor successfully onboarded!', 'success');
                    document.getElementById('addDoctorForm').reset();
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 2000);
                } else {
                    showToast(data.message || 'Failed to add doctor', 'error');
                }
            } catch (err) {
                console.error(err);
                // Fallback for demo if backend is offline
                showToast('Server connection failed (Is backend running?)', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.style.opacity = '1';
            }
        });

        // 3. Logout
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // 4. Enhanced Toast Notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const icon = type === 'success' ? '<i class="fas fa-check-circle"></i>' : '<i class="fas fa-exclamation-circle"></i>';
            
            toast.className = `toast ${type}`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animation trigger
            requestAnimationFrame(() => {
                toast.classList.add('show');
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => { container.removeChild(toast); }, 600);
            }, 3000);
        }
    </script>
</body>
</html>
